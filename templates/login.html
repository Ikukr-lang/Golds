{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark border-gold p-4">
            <h3 class="gold text-center">Вход</h3>
            <form method="post">
                <div class="mb-3"><input type="email" name="email" class="form-control bg-dark text-white" placeholder="Email" required></div>
                <div class="mb-3"><input type="password" name="password" class="form-control bg-dark text-white" placeholder="Пароль" required></div>
                <button type="submit" class="btn btn-gold w-100">Войти</button>
            </form>
            <p class="text-center mt-3"><a href="{{ url_for('auth.register') }}" class="gold">Регистрация</a></p>
        </div>
    </div>
</div>
{% endblock %}
