{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card bg-dark border-gold p-4">
            <h3 class="gold text-center">Введи код из Telegram</h3>
            <form method="post">
                <input type="text" name="code" class="form-control bg-dark text-white mb-3 text-center" 
                       maxlength="6" placeholder="123456" required>
                <button type="submit" class="btn btn-gold w-100">Подтвердить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
