{% extends 'base.html' %}
{% block content %}
<h1 class="gold text-center">{{ tournament.name }}</h1>
<h3>Турнирная таблица</h3>
<table class="table table-dark">
    <thead><tr><th>Место</th><th>Команда</th><th>Очки</th></tr></thead>
    <tbody>
        {% for i, s in enumerate(standings) %}
        <tr><td>{{ i+1 }}</td><td>{{ s.name }}</td><td>{{ s.points }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
