<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GoldLeague — {{ title|default('Футбол твоей лиги') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#000; border-bottom:3px solid #D4AF37;">
        <div class="container">
            <a class="navbar-brand fw-bold gold" href="{{ url_for('public.index') }}">GOLD LEAGUE</a>
            <div class="navbar-nav ms-auto">
                {% if current_user.is_authenticated %}
                    <a class="nav-link" href="{{ url_for('dashboard.index') }}">Кабинет</a>
                    <a class="nav-link" href="{{ url_for('tournament.create') }}">Создать турнир</a>
                    <a class="nav-link" href="{{ url_for('auth.logout') }}">Выход</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('auth.login') }}">Вход</a>
                    <a class="nav-link" href="{{ url_for('auth.register') }}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-warning">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
